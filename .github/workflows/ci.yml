name: WhizVoice Backend CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  python-tests:
    name: Python Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Set up test environment variables
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> $GITHUB_ENV
          echo "PGCRYPTO_KEY=${{ secrets.PGCRYPTO_KEY }}" >> $GITHUB_ENV
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
          echo "ASANA_ACCESS_TOKEN=${{ secrets.ASANA_ACCESS_TOKEN }}" >> $GITHUB_ENV

      - name: Run Python unit tests
        run: |
          python -m pytest tests/ -v --tb=short -x

      - name: Run Python integration tests
        run: |
          python -m pytest tests/test_preferences_integration.py -v --tb=short
        continue-on-error: true # Integration tests may fail if secrets not available

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: python-test-results
          path: |
            pytest-results.xml
            test_output.log
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [python-tests]
    if: always()

    steps:
      - name: Display test summary
        run: |
          echo "## WhizVoice Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.python-tests.result }}" == "success" ]; then
            echo "✅ Python Backend Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Python Backend Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Python unit tests (all tests in tests/)" >> $GITHUB_STEP_SUMMARY
          echo "- Python integration tests (preferences system)" >> $GITHUB_STEP_SUMMARY
          echo "- Tests the preferences bug fix we implemented" >> $GITHUB_STEP_SUMMARY

      - name: Check overall status
        run: |
          if [ "${{ needs.python-tests.result }}" != "success" ]; then
            echo "Python tests failed!"
            exit 1
          fi
          echo "All Python tests passed!"
