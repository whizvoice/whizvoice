name: Screen Agent Auto-Fix

on:
  schedule:
    # Daily fallback in case server restarts lose a pending debounce timer
    - cron: '0 8 * * *'
  repository_dispatch:
    types: [screen-agent-autofix]
  workflow_dispatch:
    inputs:
      dump_reason:
        description: 'Specific dump_reason to process (leave empty for all)'
        required: false
        type: string

concurrency:
  group: screen-agent-autofix
  cancel-in-progress: false

jobs:
  autofix:
    name: Auto-Fix UI Navigation Failures
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout whizvoice
        uses: actions/checkout@v4

      - name: Checkout whizvoiceapp
        uses: actions/checkout@v4
        with:
          repository: whizvoice/whizvoiceapp
          token: ${{ secrets.WHIZVOICEAPP_PAT }}
          path: whizvoiceapp

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-autofix-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-autofix-

      - name: Install emulator runtime deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libpulse0

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Configure git for whizvoiceapp
        run: |
          cd whizvoiceapp
          git config user.name "whizvoice-autofix[bot]"
          git config user.email "autofix@whizvoice.com"

      - name: Download snapshot and pin emulator version
        env:
          SNAPSHOT_ENCRYPTION_KEY: ${{ secrets.SNAPSHOT_ENCRYPTION_KEY }}
          GH_TOKEN: ${{ secrets.WHIZVOICEAPP_PAT }}
        run: |
          chmod +x whizvoiceapp/scripts/avd-snapshot-download.sh
          ./whizvoiceapp/scripts/avd-snapshot-download.sh
          BUILD_FILE="$HOME/.android/avd/whiz-test-device.avd/snapshot_emulator_build.txt"
          if [[ -f "$BUILD_FILE" ]]; then
            EMULATOR_BUILD=$(cat "$BUILD_FILE")
            echo "==> Pinning emulator to build $EMULATOR_BUILD (matches snapshot)"
            curl -fsSL "https://redirector.gvt1.com/edgedl/android/repository/emulator-linux_x64-${EMULATOR_BUILD}.zip" -o /tmp/emulator.zip
            rm -rf "$ANDROID_HOME/emulator"
            unzip -q /tmp/emulator.zip -d "$ANDROID_HOME"
            rm /tmp/emulator.zip
            "$ANDROID_HOME/emulator/emulator" -version | head -1
          else
            echo "==> No pinned emulator build in snapshot manifest; using default"
          fi

      - name: Run auto-fix pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.WHIZVOICEAPP_PAT }}
          SNAPSHOT_ENCRYPTION_KEY: ${{ secrets.SNAPSHOT_ENCRYPTION_KEY }}
        run: |
          ARGS="--whizvoiceapp-path ./whizvoiceapp"
          if [ -n "${{ inputs.dump_reason }}" ]; then
            ARGS="$ARGS --dump-reason '${{ inputs.dump_reason }}'"
          fi
          python scripts/autofix/run.py $ARGS 2>&1 | tee autofix.log

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autofix-logs
          path: |
            autofix.log
            /tmp/autofix-emulator.log
          retention-days: 30
